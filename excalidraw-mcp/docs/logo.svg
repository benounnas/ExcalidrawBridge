<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#1e1e2e"/>

  <!-- Deck -->
  <rect x="12" y="72" width="96" height="6" rx="3" fill="#7c3aed"/>

  <!-- Left tower -->
  <rect x="30" y="40" width="8" height="38" rx="2" fill="#7c3aed"/>

  <!-- Right tower -->
  <rect x="82" y="40" width="8" height="38" rx="2" fill="#7c3aed"/>

  <!-- Main cable (catenary sag between towers) -->
  <path d="M34 40 Q60 60 86 40" stroke="#c4b5fd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left anchorage -->
  <line x1="12" y1="72" x2="34" y2="40" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right anchorage -->
  <line x1="108" y1="72" x2="86" y2="40" stroke="#c4b5fd" stroke-width="3.5" stroke-linecap="round"/>
</svg>
